title = "gitleaks config"

# Gitleaks rules are defined by regular expressions and entropy ranges.
# Some secrets have unique signatures which make detecting those secrets easy.
# Examples of those secrets would be GitLab Personal Access Tokens, AWS keys, and GitHub Access Tokens.
# All these examples have defined prefixes like `glpat`, `AKIA`, `ghp_`, etc.
#
# Other secrets might just be a hash which means we need to write more complex rules to verify
# that what we are matching is a secret.
#
# Here is an example of a semi-generic secret
#
#   discord_client_secret = "8dyfuiRyq=vVc3RRr_edRk-fK__JItpZ"
#
# We can write a regular expression to capture the variable name (identifier),
# the assignment symbol (like '=' or ':='), and finally the actual secret.
# The structure of a rule to match this example secret is below:
#
#                                                           Beginning string
#                                                               quotation
#                                                                   │            End string quotation
#                                                                   │                      │
#                                                                   ▼                      ▼
#    (?i)(discord[a-z0-9_ .\-,]{0,25})(=|>|:=|\|\|:|<=|=>|:).{0,5}['\"]([a-z0-9=_\-]{32})['\"]
#
#                   ▲                              ▲                                ▲
#                   │                              │                                │
#                   │                              │                                │
#              identifier                  assignment symbol
#                                                                                Secret
#


#NEW	

[[rules]]
id = "agora-app-id"
description = "Agora APP ID"
regex = '''(?i)(appid|app_id|app-id)[a-z0-9_ .\-,]{0,25}(=|>|:=|\|\|:|<=|=>|:).{0,5}['\"](([0-9a-f]{8}(-[0-9a-f]{4}){3}-[0-9a-f]{12})|([0-9a-f]{32}))['\"]\s'''
secretGroup = 3

[[rules]]
id = "agora-appid"
description = "Agora AppId"
regex = '''['\"]([0-9a-f]{32})['\"]'''
secretGroup = 1

[[rules]]
id = "easemob-app-key"
description = "EaseMob APP Key"
regex = '''(?i)(IMAppKey|easemob[a-z0-9_ .\-,]{0,25})(=|>|:=|\|\|:|<=|=>|:).{0,5}['\"]([\d]{8}#[\d]{7})['\"]\s'''
secretGroup = 3

[[rules]]
id = "agora-api-key-secret"
description = "Agora API Key and Secret"
regex = '''(?i)(RestfulApiKey|RestfulApiSecret|APIKey|APISecret)[a-z0-9_ .\-,]{0,25}(=|>|:=|\|\|:|<=|=>|:).{0,5}['\"]([\d\w]{32})['\"]\s'''
secretGroup = 3

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)((key|api[^Version]|token|secret|password)[a-z0-9_ .\-,]{0,25})(=|>|:=|\|\|:|<=|=>|:).{0,5}['\"]([0-9a-zA-Z\-_=]{8,64})['\"]'''
entropy = 3.7
secretGroup = 4

[[rules]]
id = "agora-ag-app-id"
description = "Agora AG APP ID"
regex = '''(?i)(AG_APP_ID)[a-z0-9_ .\-,]{0,25}(=|>|:=|\|\|:|<=|=>|:).{0,5}['\"]([0-9a-zA-Z]{32})['\"]'''
secretGroup = 3

[[rules]]
id = "agora-ag-app-certificate"
description = "Agora AG APP Certificate"
regex = '''(?i)(AG_APP_CERTIFICATE)[a-z0-9_ .\-,]{0,25}(=|>|:=|\|\|:|<=|=>|:).{0,5}['\"]([0-9a-zA-Z]{32})['\"]'''
secretGroup = 3

[[rules]]
id = "agora-basic-auth"
description = "Agora Basic Auth Credentials"
regex = '''(?i)(BASIC_AUTH_KEY|BASIC_AUTH_SECRET)[a-z0-9_ .\-,]{0,25}(=|>|:=|\|\|:|<=|=>|:).{0,5}['\"]([0-9a-zA-Z\-_=]{8,64})['\"]'''
secretGroup = 3

[[rules]]
id = "llm-api-key"
description = "LLM API Key"
regex = '''(?i)(LLM_API_KEY)[a-z0-9_ .\-,]{0,25}(=|>|:=|\|\|:|<=|=>|:).{0,5}['\"]([a-zA-Z0-9\-_]{20,100})['\"]'''
secretGroup = 3

[[rules]]
id = "openai-api-key"
description = "OpenAI API Key"
regex = '''(?i)sk-(live|test)-[0-9a-zA-Z]{24,48}'''

[[rules]]
id = "llm-url-with-key"
description = "LLM URL with API Key"
regex = '''(?i)(LLM_URL)[a-z0-9_ .\-,]{0,25}(=|>|:=|\|\|:|<=|=>|:).{0,5}['\"](https?:\/\/[^\s'"]+?(?:api_key|apikey|token|secret|password|key)=[^\s'"&]+)['\"]'''
secretGroup = 3

[[rules]]
id = "tts-api-keys"
description = "TTS API Keys in Parameters"
regex = '''(?i)(TTS_PARAMS)[a-z0-9_ .\-,]{0,25}(=|>|:=|\|\|:|<=|=>|:).{0,5}[\s\S]{0,50}['"]key['"]:\s*['"]([a-zA-Z0-9\-_]{16,64})['"]'''
secretGroup = 3

[[rules]]
id = "microsoft-tts-key"
description = "Microsoft TTS API Key"
regex = '''(?i)(TTS_PARAMS)[a-z0-9_ .\-,]{0,25}(=|>|:=|\|\|:|<=|=>|:).{0,5}[\s\S]{0,200}['"]key['"]:\s*['"]([a-f0-9]{32})['"]'''
secretGroup = 3

[[rules]]
id = "toolbox-server-host"
description = "Agora Toolbox Server Host"
regex = '''(?i)(TOOLBOX_SERVER_HOST)[a-z0-9_ .\-,]{0,25}(=|>|:=|\|\|:|<=|=>|:).{0,5}['\"]([^\s'"]+?)['\"]'''
secretGroup = 3

[extend]
useDefault = true

[[rules]]
id = "chinese-characters"
description = "Detecting Chinese characters"
regex = '''[\p{Han}]+'''
tags = ["chinese"]

[[rules]]
id = "chinese-comments"
description = "Detect Chinese comments"
regex = '''(//|#|/\*|\*).*[\p{Han}]+'''
tags = ["chinese", "comments"]

[allowlist]
description = "global allow lists"
regexes = ['''219-09-9999''', '''078-05-1120''', '''(9[0-9]{2}|666)-\d{2}-\d{4}''']
paths = [
    '''gitleaks.toml''',
    '''(.*?)(jpg|gif|doc|pdf|bin|svg|socket)$''',
    '''(go.mod|go.sum)$''',
    '''iOS/.*\.strings''',
    '''iOS/.*\.lproj/.*''',
    '''iOS/Scenes/ConvoAI/.*''',
    '''.*\.strings$''',
    '''.*\.strings''',
    '''.*\/zh-Hans\.lproj\/.*''',
    '''.*\/zh-Hant\.lproj\/.*''',
    '''.*\/zh\.lproj\/.*''',
    '''iOS/Pods/.*''',
    '''README\.md'''
]
